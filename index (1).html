<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>이모티콘 매출 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0b0b0f;
  --s1:#13131a;
  --s2:#1a1a24;
  --s3:#22222f;
  --bd:#2c2c3e;
  --p:#818cf8;
  --p2:#e879f9;
  --p3:#34d399;
  --p4:#fb923c;
  --tx:#f0f0f8;
  --sub:#b0b0cc;
  --dim:#8080a0;
  --r:12px;
  --font:'Pretendard','Apple SD Gothic Neo',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh}

/* ── Header ── */
.hdr{
  height:56px;padding:0 32px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(11,11,15,.9);backdrop-filter:blur(16px);z-index:100;
}
.logo{font-size:15px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--p);font-style:normal}
.hdr-r{display:flex;align-items:center;gap:10px}
.ldot{width:7px;height:7px;border-radius:50%;background:var(--dim);flex-shrink:0}
.ldot.on{background:var(--p3);box-shadow:0 0 6px var(--p3);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ltxt{font-size:11px;color:var(--sub)}
.bxs{
  background:transparent;border:1px solid var(--bd);border-radius:7px;
  color:var(--sub);font-family:var(--font);font-size:11px;font-weight:600;
  padding:6px 14px;cursor:pointer;transition:all .15s;
}
.bxs:hover{border-color:var(--tx);color:var(--tx)}

/* ── Layout ── */
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
.sec{padding:24px 0 0}
.sec-hd{
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--sub);margin-bottom:18px;display:flex;align-items:center;gap:10px;
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--bd)}

/* ── Stat cards ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px}
.slbl{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:6px}
.sval{font-size:20px;font-weight:800;letter-spacing:-0.5px;word-break:keep-all}
.cp{color:var(--p)}.cp2{color:var(--p2)}.cp3{color:var(--p3)}.cp4{color:var(--p4)}

/* ── Overview chart card ── */
.cc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:8px}
.cc-top{display:flex;align-items:flex-start;margin-bottom:4px}
.cc-top h3{font-size:15px;font-weight:700;letter-spacing:-.3px}
.cc-meta{font-size:11px;color:var(--sub);margin-bottom:16px}
.ch{position:relative;height:200px}

/* ── Year tabs ── */
.ytabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.ytab{
  background:transparent;border:1px solid var(--bd);border-radius:7px;
  color:var(--sub);font-family:var(--font);font-size:12px;font-weight:700;
  padding:6px 16px;cursor:pointer;transition:all .2s;
}
.ytab.on{background:var(--p);border-color:var(--p);color:#0b0b0f}
.ytab:hover:not(.on){border-color:var(--tx);color:var(--tx)}

/* ── Emo list ── */
.elist{display:flex;flex-direction:column;gap:10px;padding-bottom:60px}
.ecard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:border-color .25s}
.ecard.open{border-color:var(--p)}
.erow{display:flex;align-items:stretch;cursor:pointer;transition:background .15s}
.erow:hover{background:var(--s2)}

/* thumb */
.ethumb{
  width:100px;flex-shrink:0;background:var(--s2);border-right:1px solid var(--bd);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:12px 8px;
}
.ethumb img{width:68px;height:68px;object-fit:contain;border-radius:8px}
.tph{width:68px;height:68px;background:var(--s3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:26px}
.tbadge{font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:4px;font-weight:700}
.tb-emo{background:rgba(129,140,248,.15);color:var(--p)}

/* info */
.einfo{flex:1;padding:14px;display:flex;flex-direction:column;justify-content:center;min-width:0;gap:4px}
.ename{font-size:15px;font-weight:700;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:11px;color:var(--sub)}

/* right */
.eright{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;padding:12px 14px 12px 0;gap:2px;flex-shrink:0}
.epkv{font-size:16px;font-weight:800;color:var(--p);letter-spacing:-0.5px;white-space:nowrap}
.epkm{font-size:10px;color:var(--sub)}
.chev{color:var(--dim);font-size:11px;margin-top:6px;transition:transform .3s}
.ecard.open .chev{transform:rotate(180deg);color:var(--p)}

/* ── Detail panel ── */
.edetail{display:none;border-top:1px solid var(--bd);background:var(--s2)}
.ecard.open .edetail{display:block}
.dih h4,.dch-bottom h4{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sub);margin-bottom:12px}

/* detail 상단 2열 */
.din{padding:20px 20px 0;display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* detail 하단 그래프 */
.dch-bottom{padding:18px 20px 20px}
.dch-wrap{position:relative;height:210px}

/* 이모티콘 이미지 그리드 */
.sqgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px}
.sqcell{
  aspect-ratio:1;background:var(--s3);border:1px solid var(--bd);
  border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;
}
.sqcell img{width:100%;height:100%;object-fit:contain}
.sqcell.gif{border-color:var(--p)}
.giftag{position:absolute;top:3px;right:3px;background:var(--p);color:#0b0b0f;font-size:7px;font-weight:800;padding:1px 4px;border-radius:3px;letter-spacing:.5px}
.sqph{font-size:14px}

/* 로얄티콘 */
.rcell{background:var(--s3);border:1px solid var(--p2);border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;aspect-ratio:3/1}
.rcell img{width:100%;height:100%;object-fit:contain}
.rcell .rph{font-size:26px}

/* 로얄 등급 breakdown */
.rbreakdown{display:flex;gap:6px;margin-top:12px}
.rbd{flex:1;background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:10px 6px;text-align:center}
.rbd-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--sub);margin-bottom:4px}
.rbd-val{font-size:16px;font-weight:800;color:var(--p2)}
.rbd-sub{font-size:10px;color:var(--dim);margin-top:2px;word-break:keep-all}

/* 일별 월 탭 */
.day-tabs{display:flex;gap:5px;margin-bottom:14px;flex-wrap:wrap}
.dtab{
  background:transparent;border:1px solid var(--bd);border-radius:6px;
  color:var(--sub);font-family:var(--font);font-size:11px;font-weight:700;
  padding:4px 12px;cursor:pointer;transition:all .15s;
}
.dtab.on{background:var(--p);border-color:var(--p);color:#0b0b0f}
.dtab:hover:not(.on){border-color:var(--tx);color:var(--tx)}

/* ── 로딩/에러 상태 ── */
.sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 20px;color:var(--sub);font-size:13px;text-align:center;line-height:1.7}
.spin{width:26px;height:26px;border:2px solid var(--bd);border-top-color:var(--p);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ══ RESPONSIVE ══ */

/* 태블릿 ~768px */
@media(max-width:768px){
  .stats{grid-template-columns:1fr 1fr}
  .sval{font-size:18px}
}

/* 모바일 ~480px */
@media(max-width:480px){
  .hdr{padding:0 14px;height:52px}
  .logo{font-size:14px}
  .ltxt{display:none}
  .bxs{font-size:10px;padding:5px 10px}

  .wrap{padding:0 14px}
  .sec{padding:18px 0 0}

  .stats{gap:8px}
  .stat{padding:14px}
  .slbl{font-size:9px}
  .sval{font-size:16px}

  .cc{padding:14px}
  .ch{height:170px}

  .ethumb{width:76px;padding:10px 6px}
  .ethumb img{width:52px;height:52px}
  .tph{width:52px;height:52px;font-size:22px}
  .tbadge{font-size:7px;padding:2px 5px}
  .einfo{padding:12px 10px;gap:3px}
  .ename{font-size:13px}
  .esub{font-size:10px}
  .eright{padding:10px 10px 10px 0}
  .epkv{font-size:14px}
  .epkm{font-size:9px}

  .din{grid-template-columns:1fr;padding:16px 16px 0;gap:16px}
  .dch-bottom{padding:14px 16px 16px}
  .dch-wrap{height:180px}
  .sqgrid{gap:4px}

  .rbreakdown{flex-direction:column;gap:6px}
  .rbd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
  .rbd-lbl{margin-bottom:0}
  .rbd-val{font-size:15px}
}
</style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="logo">이모티콘 <em>매출 현황</em></div>
    <div class="hdr-r">
      <div class="ldot" id="ldot"></div>
      <span class="ltxt" id="ltxt">로딩 중…</span>
      <button class="bxs" onclick="reloadAll()">↻ 새로고침</button>
    </div>
  </header>

  <div class="wrap">
    <div class="sec">
      <div class="sec-hd">전체 월별 매출 합계</div>
      <div class="ytabs" id="ytabs"></div>
      <div class="stats">
        <div class="stat"><div class="slbl">총 판매액</div><div class="sval cp" id="sv1">—</div></div>
        <div class="stat"><div class="slbl">이모티콘 판매액</div><div class="sval cp2" id="sv2">—</div></div>
        <div class="stat"><div class="slbl">로얄티콘 판매액</div><div class="sval cp3" id="sv3">—</div></div>
        <div class="stat"><div class="slbl">등록 이모티콘</div><div class="sval cp4" id="sv4">—</div></div>
      </div>
      <div class="cc">
        <div class="cc-top"><h3 id="ovTitle">전체 월별 판매량</h3></div>
        <div class="cc-meta" id="ovMeta"></div>
        <div class="ch"><canvas id="ovChart"></canvas></div>
      </div>
    </div>

    <div class="sec" style="padding-top:24px">
      <div class="sec-hd">이모티콘별 매출</div>
      <div class="elist" id="elist">
        <div class="sbox"><div class="spin"></div>데이터 집계 중…</div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   GLOBALS
═══════════════════════════════════════ */
const SHEET_ID = '1w7wSkqzkDXZb1IBaHokcnsRt8zbZ6_dwu-e3yaimuUI';
const PROXY    = 'https://corsproxy.io/?';
const MO       = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

let emotiList = [];   // [{id, name, thumb, imgs[10], royalImg}]
let emoLogs   = [];   // [{id, year, month, coin}]
let royLogs   = [];   // [{id, name, qty30, qty50, qty100, total, year, month, setId}]
let allYears  = [];
let selYear   = '';
let ovInst    = null;
const detInst = {};   // emoId → Chart instance (월별)
const dayInst = {};   // emoId → Chart instance (일별)

function reloadAll() { loadAll(); }

document.addEventListener('DOMContentLoaded', loadAll);

/* ═══════════════════════════════════════
   FETCH
═══════════════════════════════════════ */
async function fetchSheet(name) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(name)}&_=${Date.now()}`;
  const res  = await fetch(PROXY + encodeURIComponent(url), { cache: 'no-store' });
  if (!res.ok) throw new Error(`"${name}" 시트를 불러오지 못했습니다 (HTTP ${res.status})`);
  const text = await res.text();
  if (text.startsWith('<!')) throw new Error(`"${name}" 시트를 찾을 수 없거나 공개 설정을 확인해주세요`);
  return csvToObjects(text);
}

/* ═══════════════════════════════════════
   CSV PARSER
═══════════════════════════════════════ */
function csvToObjects(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseLine(lines[0]).map(h => h.trim());
  return lines.slice(1).map(line => {
    const cols = parseLine(line);
    const o = {};
    headers.forEach((h, i) => { o[h] = (cols[i] || '').trim(); });
    return o;
  }).filter(r => Object.values(r).some(v => v));
}

function parseLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += c;
  }
  res.push(cur);
  return res;
}

/* ═══════════════════════════════════════
   DATE PARSER  (gviz CSV: "2026/3/5 12:04:29")
═══════════════════════════════════════ */
function parseDate(s) {
  s = String(s).trim();
  if (!s || s.startsWith('=')) return null;
  const m1 = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m1) return new Date(+m1[1], +m1[2]-1, +m1[3]);
  const m2 = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
  const m3 = s.match(/^(\d{4})-(\d{2})$/);
  if (m3) return new Date(+m3[1], +m3[2]-1, 1);
  return null;
}

/* ═══════════════════════════════════════
   LOAD
═══════════════════════════════════════ */
async function loadAll() {
  setLive(false, '불러오는 중…');
  document.getElementById('elist').innerHTML =
    '<div class="sbox"><div class="spin"></div>데이터 집계 중…</div>';

  try {
    const [listRows, emoRows, royRows] = await Promise.all([
      fetchSheet('이모티콘목록'),
      fetchSheet('이모티콘판매로그'),
      fetchSheet('로얄티콘판매로그'),
    ]);

    emotiList = listRows.map(r => ({
      id:       String(r['EMOGI_ID'] || '').trim(),
      name:     r['EMOGI_NAME'] || '',
      thumb:    r['THUMB_URL']  || '',
      imgs:     Array.from({length:10}, (_, i) => r[`IMAGE_URL_${String(i+1).padStart(2,'0')}`] || ''),
      royalImg: r['ROYAL_IMAGE_URL'] || '',
    })).filter(r => r.id);

    emoLogs = emoRows.map(r => {
      const id = String(r['EMOGI_ID'] || '').trim();
      if (!id || id.startsWith('=')) return null;
      const d = parseDate(r['EMOGI_DATE'] || '');
      if (!d) return null;
      return { id, year: d.getFullYear(), month: d.getMonth(), day: d.getDate(), coin: parseInt(r['EMOGI_COIN']||'30')||30 };
    }).filter(Boolean);

    royLogs = royRows.map(r => {
      const id = String(r['ROYAL_ID'] || '').trim();
      if (!id || id.startsWith('=')) return null;
      const ds = r['SALE_DATE'] || '';
      if (!ds || ds.startsWith('=')) return null;
      const d = parseDate(ds);
      if (!d) return null;
      const q30  = parseInt(r['QTY_30']  || '0') || 0;
      const q50  = parseInt(r['QTY_50']  || '0') || 0;
      const q100 = parseInt(r['QTY_100'] || '0') || 0;
      return {
        id, name: r['ROYAL_NAME'] || '',
        qty30: q30, qty50: q50, qty100: q100,
        total: q30 + q50 + q100,
        year: d.getFullYear(), month: d.getMonth(), day: d.getDate(),
        setId: String(r['SET_EMOGI_ID'] || '').trim(),
      };
    }).filter(Boolean);

    const ys = new Set([...emoLogs, ...royLogs].map(r => r.year));
    allYears = [...ys].sort((a,b) => a-b).map(String);
    if (!allYears.length) allYears = [String(new Date().getFullYear())];
    selYear = allYears[allYears.length - 1];

    buildYearTabs();
    renderAll();
    setLive(true, '연결됨');

  } catch (err) {
    document.getElementById('elist').innerHTML = `<div class="sbox">⚠️ ${err.message}</div>`;
    setLive(false, '오류');
  }
}

/* ═══════════════════════════════════════
   YEAR TABS
═══════════════════════════════════════ */
function buildYearTabs() {
  document.getElementById('ytabs').innerHTML = allYears.map(y =>
    `<button class="ytab${y===selYear?' on':''}" onclick="selYr('${y}')">${y}년</button>`
  ).join('');
}
function selYr(y) {
  selYear = y;
  buildYearTabs();
  Object.values(detInst).forEach(c => c?.destroy());
  Object.keys(detInst).forEach(k => delete detInst[k]);
  Object.values(dayInst).forEach(c => c?.destroy());
  Object.keys(dayInst).forEach(k => delete dayInst[k]);
  renderAll();
}

/* ═══════════════════════════════════════
   AGGREGATE
═══════════════════════════════════════ */
function emoMo(emoId) {
  const arr = Array(12).fill(0);
  emoLogs.forEach(r => {
    if (String(r.id) === String(emoId) && String(r.year) === selYear) arr[r.month]++;
  });
  return arr;
}

function royMoByEmo(emoId) {
  const arr = Array(12).fill(0);
  royLogs.forEach(r => {
    if (String(r.setId) === String(emoId) && String(r.year) === selYear) arr[r.month] += r.total;
  });
  return arr;
}

function totalMo() {
  const arr = Array(12).fill(0);
  emoLogs.forEach(r => { if (String(r.year) === selYear) arr[r.month]++; });
  royLogs.forEach(r => { if (String(r.year) === selYear) arr[r.month] += r.total; });
  return arr;
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function renderAll() {
  renderOverview();
  renderStats();
  renderList();
}

function renderOverview() {
  const mo    = totalMo();
  const moWon = Array(12).fill(0);
  emoLogs.forEach(r => { if (String(r.year)===selYear) moWon[r.month] += (r.coin||30) * 100; });
  royLogs.forEach(r => { if (String(r.year)===selYear) moWon[r.month] += (r.qty30*30 + r.qty50*50 + r.qty100*100) * 100; });

  document.getElementById('ovTitle').textContent = `${selYear}년 전체 월별 매출`;
  document.getElementById('ovMeta').textContent  =
    `이모티콘 ${emotiList.length}종 · 연간 총 판매액 ${fmtWon(moWon.reduce((a,b)=>a+b,0))}`;

  if (ovInst) ovInst.destroy();
  ovInst = new Chart(document.getElementById('ovChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: MO,
      datasets: [{
        data: mo,
        backgroundColor: 'rgba(129,140,248,.6)',
        hoverBackgroundColor: 'rgba(129,140,248,.9)',
        borderRadius: 6, borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: {
          label:      c => ` 판매 ${fmt(c.parsed.y)}건`,
          afterLabel: c => ` 판매액 ${fmtWon(moWon[c.dataIndex])}`,
        }},
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#b0b0cc',font:{size:11}} },
        y: { grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#b0b0cc',font:{size:11},
          callback: v => Number(v).toLocaleString('ko-KR')
        }},
      },
      animation: { onComplete() { drawBarLabels(this, moWon); } },
    },
  });
}

function drawBarLabels(chart, moWon) {
  const ctx  = chart.ctx;
  const meta = chart.getDatasetMeta(0);
  ctx.save();
  ctx.font = '600 10px Pretendard, sans-serif';
  ctx.fillStyle = 'rgba(200,200,220,.8)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  meta.data.forEach((bar, i) => {
    if (!moWon[i]) return;
    ctx.fillText(fmtWon(moWon[i]), bar.x, bar.y - 3);
  });
  ctx.restore();
}

function renderStats() {
  const emoWon = emoLogs
    .filter(r => String(r.year) === selYear)
    .reduce((s,r) => s + (r.coin||30) * 100, 0);
  const royWon = royLogs
    .filter(r => String(r.year) === selYear)
    .reduce((s,r) => s + (r.qty30*30 + r.qty50*50 + r.qty100*100) * 100, 0);

  document.getElementById('sv1').textContent = fmtWon(emoWon + royWon);
  document.getElementById('sv2').textContent = fmtWon(emoWon);
  document.getElementById('sv3').textContent = fmtWon(royWon);
  document.getElementById('sv4').textContent = emotiList.length + '종';
}

function renderList() {
  if (!emotiList.length) {
    document.getElementById('elist').innerHTML = '<div class="sbox">이모티콘 목록이 없습니다</div>';
    return;
  }
  const sorted = [...emotiList].sort((a,b) => Number(b.id) - Number(a.id));
  const maxId  = sorted[0]?.id;
  document.getElementById('elist').innerHTML = sorted.map(e => buildCard(e, e.id === maxId)).join('');
}

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
function buildCard(e, isNew) {
  const em   = emoMo(e.id);
  const rm   = royMoByEmo(e.id);
  const eTot = em.reduce((a,b) => a+b, 0);
  const rTot = rm.reduce((a,b) => a+b, 0);

  const emoWon = emoLogs
    .filter(r => String(r.id)===String(e.id) && String(r.year)===selYear)
    .reduce((s,r) => s + (r.coin||30)*100, 0);
  const royWon = royLogs
    .filter(r => String(r.setId)===String(e.id) && String(r.year)===selYear)
    .reduce((s,r) => s + (r.qty30*30 + r.qty50*50 + r.qty100*100)*100, 0);

  const newBadge = isNew
    ? `<span style="display:inline-block;font-size:9px;font-weight:800;letter-spacing:1px;
         background:var(--p3);color:#0b0b0f;padding:2px 7px;border-radius:4px;
         margin-left:8px;vertical-align:middle;text-transform:uppercase;">NEW</span>`
    : '';

  const thumbHtml = e.thumb
    ? `<img src="${esc(e.thumb)}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
       <div class="tph" style="display:none">😊</div>`
    : `<div class="tph">😊</div>`;

  return `
  <div class="ecard" id="ec-${e.id}">
    <div class="erow" onclick="toggleCard('${e.id}')">
      <div class="ethumb">
        ${thumbHtml}
        <div class="tbadge tb-emo">이모티콘</div>
      </div>
      <div class="einfo">
        <div class="ename">${esc(e.name || '(ID:'+e.id+')')}${newBadge}</div>
        <div class="esub">이모티콘 ${fmt(eTot)}건 · 로얄티콘 ${fmt(rTot)}건</div>
      </div>
      <div class="eright">
        <div class="epkv">${fmtWon(emoWon + royWon)}</div>
        <div class="epkm">총 매출액</div>
        <div class="chev">▼</div>
      </div>
    </div>
    <div class="edetail">
      ${buildDetail(e)}
    </div>
  </div>`;
}

function buildDetail(e) {
  let sqHtml = '';
  for (let i = 0; i < 10; i++) {
    const url    = e.imgs[i];
    const isGif  = url ? url.toLowerCase().endsWith('.gif') : (i === 9);
    const gifTag = isGif ? '<span class="giftag">GIF</span>' : '';
    sqHtml += url
      ? `<div class="sqcell${isGif?' gif':''}"><img src="${esc(url)}" loading="lazy"/>${gifTag}</div>`
      : `<div class="sqcell${isGif?' gif':''}"><div class="sqph">${isGif?'🎞':'🖼'}</div>${gifTag}</div>`;
  }

  const royYear = royLogs.filter(r => String(r.setId)===String(e.id) && String(r.year)===selYear);
  const rb30  = royYear.reduce((s,r) => s+r.qty30,  0);
  const rb50  = royYear.reduce((s,r) => s+r.qty50,  0);
  const rb100 = royYear.reduce((s,r) => s+r.qty100, 0);
  const rbTot = rb30 + rb50 + rb100;

  const royImgHtml = e.royalImg
    ? `<img src="${esc(e.royalImg)}" loading="lazy"/>`
    : `<div class="rph">👑</div>`;

  const breakdownHtml = rbTot > 0
    ? `<div class="rbreakdown">
        <div class="rbd"><div class="rbd-lbl">30코인</div><div class="rbd-val">${fmt(rb30)}</div><div class="rbd-sub">${fmtWon(rb30*30*100)}</div></div>
        <div class="rbd"><div class="rbd-lbl">50코인</div><div class="rbd-val">${fmt(rb50)}</div><div class="rbd-sub">${fmtWon(rb50*50*100)}</div></div>
        <div class="rbd"><div class="rbd-lbl">100코인</div><div class="rbd-val">${fmt(rb100)}</div><div class="rbd-sub">${fmtWon(rb100*100*100)}</div></div>
      </div>`
    : '<div style="font-size:12px;color:var(--dim);margin-top:10px">판매 내역 없음</div>';

  return `
  <div class="din">
    <div class="dih">
      <h4>이모티콘 (정지형 9종 + GIF 1종)</h4>
      <div class="sqgrid">${sqHtml}</div>
    </div>
    <div class="dih">
      <h4>로얄티콘 (600 × 200)</h4>
      <div class="rcell">${royImgHtml}</div>
      ${breakdownHtml}
    </div>
  </div>
  <div class="dch-bottom">
    <h4>${selYear}년 월별 판매량</h4>
    <div class="dch-wrap"><canvas id="dc-${e.id}"></canvas></div>
  </div>
  <div class="dch-bottom" style="padding-top:0">
    <h4>일별 판매량</h4>
    <div class="day-tabs" id="dtabs-${e.id}"></div>
    <div class="dch-wrap"><canvas id="dd-${e.id}"></canvas></div>
  </div>`;
}

/* ═══════════════════════════════════════
   TOGGLE & DETAIL CHART
═══════════════════════════════════════ */
function toggleCard(emoId) {
  const card = document.getElementById('ec-'+emoId);
  const wasOpen = card.classList.contains('open');
  card.classList.toggle('open');
  if (!wasOpen) {
    setTimeout(() => {
      drawDetailChart(emoId);
      initDayTabs(emoId);
    }, 60);
  } else {
    detInst[emoId]?.destroy(); delete detInst[emoId];
    dayInst[emoId]?.destroy(); delete dayInst[emoId];
  }
}

function drawDetailChart(emoId) {
  const e = emotiList.find(x => String(x.id) === String(emoId));
  if (!e) return;
  const canvas = document.getElementById('dc-'+emoId);
  if (!canvas) return;
  detInst[emoId]?.destroy();

  const em = emoMo(e.id);
  const rm = royMoByEmo(e.id);

  const moWon = Array(12).fill(0);
  emoLogs.filter(r => String(r.id)===String(e.id) && String(r.year)===selYear)
         .forEach(r => { moWon[r.month] += (r.coin||30)*100; });
  royLogs.filter(r => String(r.setId)===String(e.id) && String(r.year)===selYear)
         .forEach(r => { moWon[r.month] += (r.qty30*30 + r.qty50*50 + r.qty100*100)*100; });

  detInst[emoId] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: MO,
      datasets: [
        {
          label: '이모티콘',
          data: em,
          backgroundColor: 'rgba(129,140,248,.75)',
          hoverBackgroundColor: 'rgba(129,140,248,1)',
          borderRadius: 4, borderSkipped: false,
        },
        {
          label: '로얄티콘',
          data: rm,
          backgroundColor: 'rgba(232,121,249,.75)',
          hoverBackgroundColor: 'rgba(232,121,249,1)',
          borderRadius: 4, borderSkipped: false,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 32 } },
      plugins: {
        legend: { display:true, labels:{ color:'#b0b0cc', font:{size:11}, boxWidth:10, padding:12 } },
        tooltip: { callbacks: {
          label:     c => ` ${c.dataset.label} ${fmt(c.parsed.y)}건`,
          afterBody: items => {
            const i = items[0]?.dataIndex;
            return i !== undefined ? [`판매액 ${fmtWon(moWon[i])}`] : [];
          },
        }},
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,.04)'}, ticks:{color:'#b0b0cc',font:{size:11}} },
        y: { grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#b0b0cc',font:{size:11},
          callback: v => v>=1000?(v/1000)+'k':v
        }},
      },
      animation: { onComplete() {
        const ctx2 = this.ctx;
        ctx2.save();
        ctx2.font = '600 10px Pretendard, sans-serif';
        ctx2.textAlign = 'center';
        ctx2.textBaseline = 'bottom';
        this.data.datasets.forEach((ds, di) => {
          this.getDatasetMeta(di).data.forEach((bar, i) => {
            if (!ds.data[i]) return;
            ctx2.fillStyle = di===0 ? 'rgba(180,188,255,.9)' : 'rgba(240,160,255,.9)';
            ctx2.fillText(fmt(ds.data[i])+'건', bar.x, bar.y - 3);
          });
        });
        ctx2.restore();
      }},
    },
  });
}

/* ═══════════════════════════════════════
   DAILY CHART
═══════════════════════════════════════ */
function initDayTabs(emoId) {
  const tabEl = document.getElementById('dtabs-'+emoId);
  if (!tabEl) return;

  // 해당 이모티콘의 판매 데이터가 있는 월 목록 (선택 연도 기준)
  const activeMonths = new Set();
  emoLogs.forEach(r => { if (String(r.id)===String(emoId) && String(r.year)===selYear) activeMonths.add(r.month); });
  royLogs.forEach(r => { if (String(r.setId)===String(emoId) && String(r.year)===selYear) activeMonths.add(r.month); });

  // 판매가 없으면 전체 월 표시
  const months = activeMonths.size > 0
    ? [...activeMonths].sort((a,b)=>a-b)
    : [...Array(12).keys()];

  // 기본 선택: 마지막 판매월
  const defaultMonth = months[months.length - 1];

  tabEl.innerHTML = months.map(m =>
    `<button class="dtab${m===defaultMonth?' on':''}"
       onclick="selDayTab('${emoId}', ${m}, this)">${m+1}월</button>`
  ).join('');

  drawDayChart(emoId, defaultMonth);
}

function selDayTab(emoId, month, btn) {
  const tabEl = document.getElementById('dtabs-'+emoId);
  tabEl.querySelectorAll('.dtab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  drawDayChart(emoId, month);
}

function drawDayChart(emoId, month) {
  const canvas = document.getElementById('dd-'+emoId);
  if (!canvas) return;
  dayInst[emoId]?.destroy();

  const daysInMonth = new Date(Number(selYear), month+1, 0).getDate();
  const labels = Array.from({length: daysInMonth}, (_, i) => `${i+1}`);

  // 이모티콘 일별 건수
  const emoDays = Array(daysInMonth).fill(0);
  emoLogs.forEach(r => {
    if (String(r.id)===String(emoId) && String(r.year)===selYear && r.month===month) {
      // EMOGI_DATE에서 day 추출 필요 → emoLogs에 day 저장돼 있어야 함
      if (r.day !== undefined) emoDays[r.day - 1]++;
    }
  });

  // 로얄티콘 일별 수량
  const royDays = Array(daysInMonth).fill(0);
  royLogs.forEach(r => {
    if (String(r.setId)===String(emoId) && String(r.year)===selYear && r.month===month) {
      if (r.day !== undefined) royDays[r.day - 1] += r.total;
    }
  });

  // 일별 판매액
  const dayWon = Array(daysInMonth).fill(0);
  emoLogs.forEach(r => {
    if (String(r.id)===String(emoId) && String(r.year)===selYear && r.month===month && r.day !== undefined)
      dayWon[r.day-1] += (r.coin||30)*100;
  });
  royLogs.forEach(r => {
    if (String(r.setId)===String(emoId) && String(r.year)===selYear && r.month===month && r.day !== undefined)
      dayWon[r.day-1] += (r.qty30*30+r.qty50*50+r.qty100*100)*100;
  });

  const hasData = emoDays.some(v=>v>0) || royDays.some(v=>v>0);

  dayInst[emoId] = new Chart(canvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '이모티콘',
          data: emoDays,
          backgroundColor: 'rgba(129,140,248,.75)',
          hoverBackgroundColor: 'rgba(129,140,248,1)',
          borderRadius: 3, borderSkipped: false,
        },
        {
          label: '로얄티콘',
          data: royDays,
          backgroundColor: 'rgba(232,121,249,.75)',
          hoverBackgroundColor: 'rgba(232,121,249,1)',
          borderRadius: 3, borderSkipped: false,
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display:true, labels:{ color:'#b0b0cc', font:{size:11}, boxWidth:10, padding:12 } },
        tooltip: { callbacks: {
          title:     items => `${Number(selYear)}년 ${month+1}월 ${items[0].label}일`,
          label:     c => ` ${c.dataset.label} ${fmt(c.parsed.y)}건`,
          afterBody: items => {
            const i = items[0]?.dataIndex;
            return i !== undefined && dayWon[i] ? [`판매액 ${fmtWon(dayWon[i])}`] : [];
          },
        }},
        ...(hasData ? {} : {
          // 데이터 없을 때 안내 텍스트
        }),
      },
      scales: {
        x: { grid:{color:'rgba(255,255,255,.03)'}, ticks:{color:'#b0b0cc',font:{size:9},maxRotation:0} },
        y: { grid:{color:'rgba(255,255,255,.06)'}, ticks:{color:'#b0b0cc',font:{size:11},
          callback: v => Number.isInteger(v) ? v : '',
          stepSize: 1,
        }},
      },
    },
  });
}


function fmt(n)    { return Number(n||0).toLocaleString('ko-KR'); }
function fmtWon(n) { return fmt(Number(n||0)) + '원'; }
function esc(s)    {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setLive(on, txt) {
  document.getElementById('ldot').className = 'ldot' + (on ? ' on' : '');
  document.getElementById('ltxt').textContent = txt;
}
</script>
